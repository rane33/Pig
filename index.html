<html lang="en">
<head>

<title>Happy Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background-image:url("images/bg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

position:relative;

}
body::before{

content:"";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(255,255,255,.25);

backdrop-filter:blur(2px);

z-index:-1;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.circle{

position:absolute;
border-radius:50%;
background:rgba(255,255,255,.28);
animation:float 15s linear infinite;

}

.circle:nth-child(1){
width:250px;
height:250px;
left:-70px;
bottom:-80px;
}

.circle:nth-child(2){
width:180px;
height:180px;
right:-40px;
top:-40px;
animation-duration:18s;
}

.circle:nth-child(3){
width:90px;
height:90px;
left:18%;
top:18%;
animation-duration:12s;
}

.circle:nth-child(4){
width:120px;
height:120px;
right:22%;
bottom:10%;
animation-duration:16s;
}

@keyframes float{

50%{

transform:translateY(-25px);

}

}

.star{

position:absolute;
font-size:40px;

animation:spin 8s linear infinite;

}

.s1{
top:70px;
left:80px;
color:#ff4db8;
}

.s2{
top:120px;
right:80px;
color:#7c4dff;
}

.s3{
bottom:120px;
left:120px;
color:#7c4dff;
}

.s4{
bottom:90px;
right:110px;
color:#ff4db8;
}

@keyframes spin{

100%{

transform:rotate(360deg);

}

}

.heart{

position:absolute;
font-size:28px;
color:white;

animation:up 6s linear infinite;

opacity:.8;

}

.h1{
left:15%;
bottom:-20px;
}

.h2{
right:18%;
bottom:-60px;
animation-delay:2s;
}

.h3{
left:70%;
bottom:-100px;
animation-delay:4s;
}

@keyframes up{

0%{

transform:translateY(0);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-110vh);

opacity:0;

}

}

.card{

width:90%;
max-width:650px;

background:rgba(255,255,255,.25);

backdrop-filter:blur(18px);

border-radius:35px;

padding:50px;

text-align:center;

box-shadow:0 25px 60px rgba(0,0,0,.18);

animation:popup 1s;

}

@keyframes popup{

from{

opacity:0;
transform:scale(.7);

}

to{

opacity:1;
transform:scale(1);

}

}

.small{

font-size:22px;

font-weight:700;

letter-spacing:8px;

color:#4b3ba5;

}

.big{


font-size:clamp(42px, 11vw, 72px);
font-weight:900;
line-height:0.95;
color:white;
text-shadow:0 6px 20px rgba(0,0,0,.15);
margin-top:12px;
word-break:break-word;


}

.name{

margin-top:25px;

font-size:28px;

font-weight:600;

color:#FF0000;

}

.msg{

margin-top:18px;

font-size:18px;

color:#444;

line-height:1.8;

}

button{

margin-top:40px;

padding:18px 55px;

font-size:20px;

font-weight:700;

border:none;

border-radius:60px;

cursor:pointer;

background:white;

color:#ff2e88;

box-shadow:0 15px 35px rgba(255,0,120,.35);

transition:.35s;

}

button:hover{

transform:translateY(-6px) scale(1.05);

box-shadow:0 20px 45px rgba(255,0,120,.45);

}

button:active{

transform:scale(.95);

}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="star s1">⭐</div>
<div class="star s2">⭐</div>
<div class="star s3">⭐</div>
<div class="star s4">⭐</div>

<div class="heart h1">🤍</div>
<div class="heart h2">🤍</div>
<div class="heart h3">🤍</div>

<div class="card">

<div class="small">

HAPPY

</div>

<div class="big">

BIRTHDAY

</div>

<div class="name">

Shamaldas🐽

</div>

<div class="msg">

Today is all about smiles, happiness,
beautiful memories and celebrating
the wonderful person you are.

</div>

<button onclick="window.location='memories.html'">

🎁🐽🐷🐽🐷

</button>

</div>

</body>
