#intro{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

z-index:999;

animation:introFade 1.5s forwards;

animation-delay:3s;

overflow:hidden;

}

#intro img{

width:100%;
height:100%;

object-fit:cover;

animation:introZoom 3s linear forwards;

}







@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}
@keyframes introZoom{

from{

transform:scale(1);

}

to{

transform:scale(1.12);

}

}

@keyframes introFade{

from{

opacity:1;

}

to{

opacity:0;
visibility:hidden;
pointer-events:none;

}

}





 

.circle{

position:absolute;
border-radius:50%;
background:rgba(255,255,255,.28);
animation:float 15s linear infinite;

}

.circle:nth-child(1){
width:250px;
height:250px;
left:-70px;
bottom:-80px;
}

.circle:nth-child(2){
width:180px;
height:180px;

}

.circle:nth-child(3){

}

.circle:nth-child(4){
width:120px;

right:22%;

}

}
