<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
/*
background:linear-gradient(180deg,#050816,#09163a,#132c66);

margin:0;
font-family:'Poppins',sans-serif;

background:
linear-gradient(rgba(20,0,20,.55),rgba(20,0,20,.55)),
url("images/family-bg.jpg");

background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;

overflow:hidden;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

color:white;

}

canvas{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

z-index:1;

}
#cakeContainer{

position:fixed;

left:50%;

bottom:8px;

transform:translateX(-50%);

z-index:50;

display:flex;

flex-direction:column;

align-items:center;

animation:cakeUp 1.8s ease;

}
#realCake{

width:230px;
height:auto;

display:block;

filter:
drop-shadow(0 18px 35px rgba(0,0,0,.40));

transition:transform .35s ease;

pointer-events:none;

}

#realCake:hover{

transform:scale(1.02);

}
  
#celebrateBtn{

margin-top:10px;

padding:15px 36px;

border:none;

border-radius:40px;

font-size:20px;

font-weight:600;

cursor:pointer;

background:linear-gradient(45deg,#ff5ea8,#ff8c42);

color:white;

box-shadow:0 10px 25px rgba(255,80,140,.4);

transition:.35s;

}

#celebrateBtn:hover{

transform:scale(1.06);

}

@media(max-width:768px){

#cakeContainer{

bottom:5px;

}

#realCake{

width:155px;

}

#celebrateBtn{

font-size:17px;

padding:12px 26px;

}

}

/*
@keyframes rise{

0%{

transform:translateY(600px);

}

100%{

transform:translateY(0);

}

}*/

@keyframes rise{

0%{

transform:translate(-50%,600px);

}

100%{

transform:translate(-50%,0);

}

}

@keyframes flicker{

from{

transform:scale(1);

opacity:1;

}

to{

transform:scale(.85);

opacity:.8;

}

}

@keyframes titleGlow{

from{

text-shadow:0 0 20px hotpink;

}

to{

text-shadow:0 0 50px gold;

}

}

@keyframes showText{

to{

opacity:1;

}

}

@keyframes cakeUp{

0%{

opacity:0;

transform:translate(-50%,180px);

}

100%{

opacity:1;

transform:translate(-50%,0);

}

}

.b1{left:8%;animation-delay:0s;}
.b2{left:20%;animation-delay:2s;}
.b3{left:35%;animation-delay:4s;}
.b4{left:52%;animation-delay:1s;}
.b5{left:70%;animation-delay:3s;}
.b6{left:88%;animation-delay:5s;}



@media(max-width:768px){



}

  
</style>

</head>

<body>

<canvas id="fireworks"></canvas>

<div id="cakeContainer">

   <img src="images/cake-final.png" id="realCake" alt="Birthday Cake">

   <button id="celebrateBtn">
         🍸🥂🍾
   </button>

</div>
  

<script>

const c=document.getElementById("fireworks");

const ctx=c.getContext("2d");

c.width=innerWidth;

c.height=innerHeight;
