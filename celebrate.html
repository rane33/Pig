.title{

font-weight:700;

letter-spacing:1px;

text-shadow:
0 0 12px rgba(255,255,255,.5),
0 0 28px rgba(255,90,140,.45);

animation:titleGlow 2.5s infinite alternate;

}  


.subtitle{

margin-top:20px;

font-size:22px;

font-weight:300;

letter-spacing:1px;

opacity:.9;

}


/*.cake{

position:relative;

width:260px;

.cake{

position:absolute;

bottom:20px;

left:50%;

transform:translateX(-50%) scale(.65);

width:260px;

opacity:0.85;

animation:rise 2.5s ease;

z-index:5;

}

.layer1{

height:80px;

background:#ff8fa3;

border-radius:18px;

}

.layer2{

width:210px;

height:70px;

background:#ffc2d1;

margin:auto;

margin-top:-8px;

border-radius:18px;

}

.layer3{

width:160px;

height:60px;

background:#ffe5ec;

margin:auto;

margin-top:-8px;

border-radius:18px;

}

.icing{

width:260px;

height:18px;

background:white;

border-radius:20px;

margin-top:-8px;

}

.candle{

width:12px;

height:55px;

background:#00e5ff;

margin:auto;

margin-top:-170px;

border-radius:6px;

position:relative;

}

.flame{

width:18px;

height:18px;

background:gold;

border-radius:50%;

position:absolute;

left:-3px;

top:-18px;

box-shadow:0 0 30px yellow;

animation:flicker .3s infinite alternate;

}

.message{

margin-top:45px;

font-size:26px;

font-weight:400;

line-height:1.8;

max-width:720px;

margin-left:auto;
margin-right:auto;

padding:0 20px;

opacity:0;

animation:showText 2s forwards;

animation-delay:2.2s;

}
/*
@keyframes rise{

0%{

transform:translateY(600px);

}

100%{

transform:translateY(0);

}

}*/

@keyframes rise{

0%{

transform:translate(-50%,600px);

}

100%{

transform:translate(-50%,0);

}

}

@keyframes flicker{

from{

transform:scale(1);

opacity:1;

}

to{

transform:scale(.85);

opacity:.8;

}

}

@keyframes titleGlow{

from{

text-shadow:0 0 20px hotpink;

}

to{

text-shadow:0 0 50px gold;

}

}

@keyframes showText{

to{

opacity:1;

}

}
